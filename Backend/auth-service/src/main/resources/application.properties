spring.application.name=CineVerse
server.port=${PORT:8080}

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:h2:mem:cineverse;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Configurations
# Secret is a 256-bit Hex encoded key
cineverse.jwt.secret=${JWT_SECRET:9a6747fc6259aa374abfcd182e1858c290a618fce1868a8677c7f3df4ab1e483}
cineverse.jwt.expiration-ms=86400000
